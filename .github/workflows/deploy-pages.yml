# Build and publish to the gh-pages branch on every push to main (same as `npm run deploy`).
# After this file is on GitHub, you only need to commit + push — no manual deploy step.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gh-pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (studio galleries + Vite)
        run: node scripts/build-studio.js && npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
